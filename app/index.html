<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passenger Status Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SEARCH SCREEN -->
  <div id="screen-search" class="screen active">
    <div class="brand">
      <div class="brand-icon">✈</div>
      <div>
        <div class="brand-title">Passenger Status</div>
        <div class="brand-sub">Sales Order Manager</div>
      </div>
    </div>

    <div class="search-card">
      <label class="field-label">Find Sales Order</label>
      <div class="search-row">
        <input
          type="text"
          id="so-search-input"
          class="input"
          placeholder="Type order subject or number..."
          autocomplete="off"
        />
        <button class="btn-primary" id="btn-search">Search</button>
      </div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="search-status" class="status-msg"></div>
    </div>
  </div>

  <!-- PASSENGERS SCREEN -->
  <div id="screen-passengers" class="screen">
    <div class="top-bar">
      <button class="btn-back" id="btn-back">← Back</button>
      <div class="order-info">
        <span class="order-label">Sales Order</span>
        <span class="order-name" id="order-name-display">—</span>
      </div>
      <div class="save-area">
        <span class="save-status" id="save-status"></span>
        <button class="btn-primary" id="btn-save-all">Save All Changes</button>
      </div>
    </div>

    <div class="legend-bar">
      <span class="legend-item"><span class="dot dot-green"></span>Paid</span>
      <span class="legend-item"><span class="dot dot-blue"></span>Docs Uploaded</span>
      <span class="legend-item"><span class="dot dot-orange"></span>Visa OK</span>
      <span class="legend-item"><span class="dot dot-purple"></span>Confirmed</span>
    </div>

    <div class="table-wrap">
      <div id="loading-passengers" class="loading-state">
        <div class="spinner"></div>
        <span>Loading passengers…</span>
      </div>
      <table class="passenger-table" id="passenger-table">
        <thead>
          <tr>
            <th class="col-name">Passenger</th>
            <th class="col-check">
              <span class="th-label paid-label">Paid</span>
            </th>
            <th class="col-check">
              <span class="th-label docs-label">Docs</span>
            </th>
            <th class="col-check">
              <span class="th-label visa-label">Visa</span>
            </th>
            <th class="col-check">
              <span class="th-label conf-label">Confirmed</span>
            </th>
            <th class="col-notes">Notes</th>
          </tr>
        </thead>
        <tbody id="passenger-tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">
        No passengers found in this Sales Order's subform.
      </div>
    </div>

    <div class="footer-bar">
      <span id="passenger-count" class="count-label"></span>
      <button class="btn-ghost" id="btn-toggle-all-paid">Toggle All Paid</button>
    </div>
  </div>

  <script src="https://js.zohostatic.com/zohocrm/sdk/2.0/ZohoCRMWidget.js"></script>
  <script src="js/widget.js"></script>
</body>
</html>
